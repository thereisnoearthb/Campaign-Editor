<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Campaign Editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/2.0.2/quill.snow.css" />
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link rel="icon" type="image/x-icon" href="assets/pencil-square.svg">
</head>

<body>
  <header>
    <h1>Campaign Editor</h1>
  </header>

  <div id="file-upload-container">
    <label for="html-file-input">Select template.html:</label>
    <input type="file" id="html-file-input" accept=".html" />
  </div>

  <main>
    <!-- Editor Section -->
    <div class="editor-section">
      <h2>Edit Campaign</h2>

      <!-- Page Title and Meta -->
      <label for="page-title-input">Campaign Title</label>
      <input type="text" id="page-title-input" placeholder="Enter campaign title" />

      <label for="meta-description-input">Meta Description</label>
      <input type="text" id="meta-description-input" placeholder="Enter meta description" />

      <label for="og-image-input">Social Preview Image</label>
      <input type="url" id="og-image-input" placeholder="Enter Social Preview image URL" />

      <!-- Section Headings -->
      <div class="section-header">
        <label>Section Headings</label>
        <button type="button" id="add-section-heading-btn" class="add-btn">+</button>
      </div>
      <div id="section-headings-container">
        <!-- Will be populated dynamically -->
      </div>

      <!-- Image Uploads -->
      <div class="section-header">
        <label>Campaign Images</label>
        <button type="button" id="add-image-btn" class="add-btn">+</button>
      </div>
      <div id="image-uploads-container">
        <!-- Will be populated dynamically -->
      </div>

      <!-- Paragraphs -->
      <label for="paragraph1-editor">Paragraph 1</label>
      <div id="paragraph1-editor" style="height: 150px; background-color: #fff; border: 1px solid #ccc"></div>

      <!-- Social Links -->
      <div id="social-links-container">
        <label for="email-link-input">Email</label>
        <input type="url" id="email-link-input" placeholder="Email Link" />

        <label for="twitter-link-input">Twitter</label>
        <input type="url" id="twitter-link-input" placeholder="Twitter Link" />

        <label for="whatsapp-link-input">WhatsApp</label>
        <input type="url" id="whatsapp-link-input" placeholder="WhatsApp Link" />

        <label for="instagram-link-input">Instagram</label>
        <input type="url" id="instagram-link-input" placeholder="Instagram Link" />
      </div>

      <!-- Link Button Sections -->
      <div class="section-header">
        <label>Link Button Sections</label>
        <button type="button" id="add-link-button-section-btn" class="add-btn">+</button>
      </div>
      <div id="link-button-sections-container">
        <!-- Will be populated dynamically -->
      </div>

      <!-- Download Button -->
      <button id="download-btn">Download HTML</button> It will be saved as
      updated-campaign.html
    </div>

    <!-- Preview Section -->
    <div class="preview-section">
      <h2>Preview</h2>
      <iframe id="preview-frame" title="Campaign Preview"></iframe>
    </div>
  </main>

  <!-- Quill Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/2.0.2/quill.min.js"></script>

  <!-- Editor Script -->
  <script>
    const paragraph1Editor = new Quill("#paragraph1-editor", {
      theme: "snow",
    });
    let currentHTML = "";

    const htmlFileInput = document.getElementById("html-file-input");
    const pageTitleInput = document.getElementById("page-title-input");
    const metaDescriptionInput = document.getElementById("meta-description-input");
    const ogImageInput = document.getElementById("og-image-input");
    const previewFrame = document.getElementById("preview-frame");

    // Container references
    const sectionHeadingsContainer = document.getElementById("section-headings-container");
    const imageContainer = document.getElementById("image-uploads-container");
    const linkButtonSectionsContainer = document.getElementById("link-button-sections-container");

    // Function to process HTML content and populate the editor
    function processAndLoadHtmlContent(htmlString) {
      currentHTML = htmlString;

      // Parse the loaded HTML
      const parser = new DOMParser();
      const doc = parser.parseFromString(currentHTML, "text/html");

      // Clear existing containers
      sectionHeadingsContainer.innerHTML = "";
      imageContainer.innerHTML = "";
      linkButtonSectionsContainer.innerHTML = "";

      // Count and generate section heading input fields
      const sectionHeadings = doc.querySelectorAll(".section-heading");
      const sectionHeadingCount = Math.max(sectionHeadings.length, 1);

      for (let i = 1; i <= sectionHeadingCount; i++) {
        const div = createSectionHeadingInputs(i);
        sectionHeadingsContainer.appendChild(div);
        div.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      }

      // Count and generate image input fields
      const imageSlides = doc.querySelectorAll(".swiper-slide");
      const imageCount = Math.max(imageSlides.length, 1);

      for (let i = 1; i <= imageCount; i++) {
        const div = createImageInputs(i);
        imageContainer.appendChild(div);
        div.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      }

      // Count and generate link button section input fields
      const linkButtonSections = doc.querySelectorAll(".link-button-section");
      const linkButtonSectionCount = Math.max(linkButtonSections.length, 1);

      for (let i = 1; i <= linkButtonSectionCount; i++) {
        const div = createLinkButtonSectionInputs(i);
        linkButtonSectionsContainer.appendChild(div);
        div.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      }

      // Load the content into the editor fields
      loadHTMLIntoEditor(currentHTML);
    }

    // Function to load the default template (index.html)
    async function loadDefaultTemplate() {
      try {
        const response = await fetch("index.html");
        if (!response.ok) {
          throw new Error(
            `HTTP error! status: ${response.status}. Failed to load default template 'index.html'. Please select a template manually.`
          );
        }
        const htmlContent = await response.text();
        processAndLoadHtmlContent(htmlContent);
      } catch (error) {
        console.error(error.message);
      }
    }

    // Function to create section heading inputs
    function createSectionHeadingInputs(index) {
      const div = document.createElement("div");
      div.className = "section-heading-container";
      div.draggable = true;
      div.dataset.index = index;

      div.innerHTML = `
          <span class="drag-handle">☰</span>
          <input type="text" id="section-heading${index}-input" placeholder="Section Heading ${index}">
          <button class="delete-btn" title="Delete section heading">×</button>
        `;

      // Add drag event listeners
      div.addEventListener("dragstart", handleDragStart);
      div.addEventListener("dragover", handleDragOver);
      div.addEventListener("drop", handleDrop);
      div.addEventListener("dragend", handleDragEnd);

      // Add delete button listener
      div.querySelector(".delete-btn").addEventListener("click", () => {
        div.remove();
        updatePreview();
      });

      return div;
    }

    // Function to create image inputs
    function createImageInputs(index) {
      const div = document.createElement("div");
      div.className = "image-upload-container";
      div.draggable = true;
      div.dataset.index = index;

      div.innerHTML = `
          <span class="drag-handle">☰</span>
          <input type="text" id="image${index}-input" placeholder="Image ${index} URL">
          <input type="text" id="image${index}-alt-input" placeholder="Image ${index} Alt Text">
          <button class="delete-btn" title="Delete image">×</button>
        `;

      // Add drag event listeners
      div.addEventListener("dragstart", handleDragStart);
      div.addEventListener("dragover", handleDragOver);
      div.addEventListener("drop", handleDrop);
      div.addEventListener("dragend", handleDragEnd);

      // Add delete button listener
      div.querySelector(".delete-btn").addEventListener("click", () => {
        div.remove();
        updatePreview();
      });

      return div;
    }

    // Function to create link button section inputs
    function createLinkButtonSectionInputs(index) {
      const div = document.createElement("div");
      div.className = "link-button-section-container";
      div.draggable = true;
      div.dataset.index = index;

      div.innerHTML = `
          <span class="drag-handle">☰</span>
          <div class="button-section-inputs">
            <input type="text" class="button-text" placeholder="Button ${index} Text">
            <input type="url" class="button-link" placeholder="Button ${index} Link">
          </div>
          <button class="delete-btn" title="Delete button section">×</button>
        `;

      // Add drag event listeners
      div.addEventListener("dragstart", handleDragStart);
      div.addEventListener("dragover", handleDragOver);
      div.addEventListener("drop", handleDrop);
      div.addEventListener("dragend", handleDragEnd);

      // Add delete button listener
      div.querySelector(".delete-btn").addEventListener("click", () => {
        div.remove();
        updatePreview();
      });

      return div;
    }

    // Drag and drop handlers
    let draggedItem = null;

    function handleDragStart(e) {
      draggedItem = this;
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/html", this.innerHTML);
      this.classList.add("dragging");
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      const boundingRect = this.getBoundingClientRect();
      const offset = boundingRect.y + boundingRect.height / 2;
      if (e.clientY < offset) {
        this.parentNode.insertBefore(draggedItem, this);
      } else {
        this.parentNode.insertBefore(draggedItem, this.nextSibling);
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      return false;
    }

    function handleDragEnd() {
      this.classList.remove("dragging");
      updatePreview();
    }

    // File input handler
    htmlFileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          processAndLoadHtmlContent(e.target.result);
        };
        reader.readAsText(file);
      }
    });

    // Function to load HTML content into editor fields
    function loadHTMLIntoEditor(htmlContent) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlContent, "text/html");

      // Update page title input
      const pageTitle = doc.querySelector(".page-title");
      pageTitleInput.value = pageTitle ? pageTitle.textContent : "";

      // Update meta description
      const metaDescription = doc.querySelector('meta[name="description"]');
      metaDescriptionInput.value = metaDescription ? metaDescription.getAttribute("content") : "";

      // Update OG Image
      const ogImageTag = doc.querySelector('meta[property="og:image"]');
      ogImageInput.value = ogImageTag ? ogImageTag.getAttribute("content") : "";

      // Update section headings
      const sectionHeadings = doc.querySelectorAll(".section-heading");
      sectionHeadings.forEach((heading, index) => {
        const headingInput = sectionHeadingsContainer.querySelector(`#section-heading${index + 1}-input`);
        if (headingInput) headingInput.value = heading.textContent;
      });

      // Update images
      const images = doc.querySelectorAll(".swiper-slide img");
      images.forEach((img, index) => {
        const imageInput = imageContainer.querySelector(`#image${index + 1}-input`);
        if (imageInput) imageInput.value = img.src;
        const imageAltInput = imageContainer.querySelector(`#image${index + 1}-alt-input`);
        if (imageAltInput) imageAltInput.value = img.alt;
      });

      // Update paragraphs
      const paragraphs = doc.querySelectorAll(".card-text");
      if (paragraphs[0]) paragraph1Editor.root.innerHTML = paragraphs[0].innerHTML;

      // Update social links
      const socialLinks = {
        email: doc.querySelector(".email-btn"),
        twitter: doc.querySelector(".x-btn"),
        whatsapp: doc.querySelector(".whatsapp-btn"),
        instagram: doc.querySelector(".instagram-btn"),
      };

      document.getElementById("email-link-input").value = socialLinks.email ? socialLinks.email.href : "";
      document.getElementById("twitter-link-input").value = socialLinks.twitter ? socialLinks.twitter.href : "";
      document.getElementById("whatsapp-link-input").value = socialLinks.whatsapp ? socialLinks.whatsapp.href : "";
      document.getElementById("instagram-link-input").value = socialLinks.instagram ? socialLinks.instagram.href : "";

      // Update link button sections
      const linkButtonSections = doc.querySelectorAll(".link-button-section .link-button");
      linkButtonSections.forEach((button, index) => {
        const buttonContainer = linkButtonSectionsContainer.children[index];
        if (buttonContainer) {
          const buttonTextInput = buttonContainer.querySelector(".button-text");
          const buttonLinkInput = buttonContainer.querySelector(".button-link");
          if (buttonTextInput) buttonTextInput.value = button.textContent.trim();
          if (buttonLinkInput) buttonLinkInput.value = button.href;
        }
      });

      updatePreview();
    }

    // Update preview function
    function updatePreview() {
      if (!currentHTML) return;

      const doc = new DOMParser().parseFromString(currentHTML, "text/html");

      // Update Title
      const pageTitle = doc.querySelector(".page-title");
      if (pageTitle) pageTitle.textContent = pageTitleInput.value;

      // Update Meta Description
      const metaDescription = doc.querySelector('meta[name="description"]');
      if (metaDescription) metaDescription.setAttribute("content", metaDescriptionInput.value);

      // Update OG Image
      const ogImageTag = doc.querySelector('meta[property="og:image"]');
      if (ogImageTag) ogImageTag.setAttribute("content", ogImageInput.value);

      // Update Title Tag
      const titleTag = doc.querySelector("title");
      if (titleTag) titleTag.textContent = pageTitleInput.value;

      // Update Section Headings
      const sectionHeadings = doc.querySelectorAll(".section-heading");
      const sectionHeadingInputs = sectionHeadingsContainer.querySelectorAll(".section-heading-container input");
      sectionHeadingInputs.forEach((input, index) => {
        if (sectionHeadings[index]) {
          sectionHeadings[index].textContent = input.value;
        }
      });

      // Update Images
      const swiperWrapper = doc.querySelector(".swiper-wrapper");
      if (swiperWrapper) {
        swiperWrapper.innerHTML = "";
        const imageInputs = imageContainer.querySelectorAll(".image-upload-container");
        imageInputs.forEach((container) => {
          const inputs = container.querySelectorAll("input[type='text']");
          const urlInput = inputs[0];
          const altInput = inputs[1];

          if (urlInput && urlInput.value) {
            const slide = document.createElement("div");
            slide.className = "swiper-slide";
            slide.innerHTML = `<img src="${urlInput.value}" alt="${altInput.value || 'Campaign Image'}" loading="lazy">`;
            swiperWrapper.appendChild(slide);
          }
        });
      }

      // Update Paragraphs
      const paragraphs = doc.querySelectorAll(".card-text");
      if (paragraphs[0]) paragraphs[0].innerHTML = paragraph1Editor.root.innerHTML;

      // Update Social Links
      const socialLinks = {
        email: doc.querySelector(".email-btn"),
        twitter: doc.querySelector(".x-btn"),
        whatsapp: doc.querySelector(".whatsapp-btn"),
        instagram: doc.querySelector(".instagram-btn"),
      };

      if (socialLinks.email) socialLinks.email.href = document.getElementById("email-link-input").value;
      if (socialLinks.twitter) socialLinks.twitter.href = document.getElementById("twitter-link-input").value;
      if (socialLinks.whatsapp) socialLinks.whatsapp.href = document.getElementById("whatsapp-link-input").value;
      if (socialLinks.instagram) socialLinks.instagram.href = document.getElementById("instagram-link-input").value;

      // Update Link Button Sections
      const linkButtonSections = doc.querySelectorAll(".link-button-section");
      const linkButtonSectionInputs = linkButtonSectionsContainer.querySelectorAll(".link-button-section-container");

      linkButtonSectionInputs.forEach((container, index) => {
        const textInput = container.querySelector(".button-text");
        const linkInput = container.querySelector(".button-link");

        if (linkButtonSections[index]) {
          const button = linkButtonSections[index].querySelector(".link-button");
          if (button) {
            button.textContent = textInput.value || "";
            button.href = linkInput.value || "#";
          }
        }
      });

      previewFrame.srcdoc = doc.documentElement.outerHTML;
    }

    // Add event listeners for live updates
    [pageTitleInput, metaDescriptionInput, ogImageInput].forEach(input => {
      input.addEventListener("input", updatePreview);
    });
    paragraph1Editor.on("text-change", updatePreview);

    // Add event listeners for the add buttons
    document.getElementById("add-section-heading-btn").addEventListener("click", () => {
      const currentCount = sectionHeadingsContainer.querySelectorAll(".section-heading-container").length;
      const newIndex = currentCount + 1;
      const newInputs = createSectionHeadingInputs(newIndex);
      sectionHeadingsContainer.appendChild(newInputs);
      newInputs.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      updatePreview();
    });

    document.getElementById("add-image-btn").addEventListener("click", () => {
      const currentCount = imageContainer.querySelectorAll(".image-upload-container").length;
      const newIndex = currentCount + 1;
      const newInputs = createImageInputs(newIndex);
      imageContainer.appendChild(newInputs);
      newInputs.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      updatePreview();
    });

    document.getElementById("add-link-button-section-btn").addEventListener("click", () => {
      const currentCount = linkButtonSectionsContainer.querySelectorAll(".link-button-section-container").length;
      const newIndex = currentCount + 1;
      const newInputs = createLinkButtonSectionInputs(newIndex);
      linkButtonSectionsContainer.appendChild(newInputs);
      newInputs.querySelectorAll("input").forEach((input) => input.addEventListener("input", updatePreview));
      updatePreview();
    });

    // Download button functionality
    document.getElementById("download-btn").addEventListener("click", () => {
      if (!currentHTML) {
        alert("Please load an HTML file first");
        return;
      }

      const pageContent = `<!DOCTYPE html>\n${previewFrame.srcdoc}`;
      const blob = new Blob([pageContent], { type: "text/html" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "updated-campaign.html";
      link.click();
    });

    // Initialize
    loadDefaultTemplate();
  </script>
</body>

</html>
